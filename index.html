<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مساعد الطلاب الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary:#2563EB; --primary-light:#EFF6FF; --primary-dark:#1E40AF;
  --accent:#7C3AED; --bg:#F8FAFF; --surface:#FFFFFF;
  --text:#0F172A; --muted:#64748B; --light:#94A3B8;
  --border:#E2E8F0; --success:#059669; --success-light:#ECFDF5;
}
body { font-family:'IBM Plex Sans Arabic',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; overflow:hidden; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; box-shadow:0 1px 8px rgba(0,0,0,0.06); }
.logo { width:38px; height:38px; background:linear-gradient(135deg,var(--primary),var(--accent)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.header-info h1 { font-size:15px; font-weight:700; }
.header-info p { font-size:11px; color:var(--muted); }
.dot { width:8px; height:8px; background:var(--success); border-radius:50%; margin-right:auto; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.subjects { background:var(--surface); padding:8px 12px; border-bottom:1px solid var(--border); display:flex; gap:6px; overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
.subjects::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:5px 12px; border-radius:20px; font-size:11px; font-weight:500; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-family:inherit; transition:all .2s; white-space:nowrap; }
.chip.active,.chip:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
#chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; padding-bottom:100px; }
.welcome { text-align:center; padding:24px 16px; }
.welcome-icon { font-size:48px; margin-bottom:12px; }
.welcome h2 { font-size:20px; font-weight:700; margin-bottom:8px; }
.welcome p { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:18px; }
.quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:340px; margin:0 auto; }
.quick-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:11px; color:var(--text); cursor:pointer; text-align:right; font-family:inherit; line-height:1.4; transition:all .2s; }
.quick-btn:hover { border-color:var(--primary); background:var(--primary-light); color:var(--primary-dark); }
.msg { display:flex; gap:8px; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction:row-reverse; }
.av { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-top:2px; }
.msg.user .av { background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; font-weight:700; font-size:11px; }
.msg.bot .av { background:linear-gradient(135deg,#F59E0B,#EF4444); font-size:16px; }
.bubble { max-width:84%; padding:11px 14px; border-radius:14px; font-size:13.5px; line-height:1.8; }
.msg.user .bubble { background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; border-radius:14px 4px 14px 14px; }
.msg.bot .bubble { background:var(--surface); border:1px solid var(--border); border-radius:4px 14px 14px 14px; color:var(--text); }
.thinking { display:flex; gap:5px; align-items:center; padding:6px 0; }
.thinking span { width:7px; height:7px; border-radius:50%; background:var(--light); animation:bounce 1.2s infinite; }
.thinking span:nth-child(2){animation-delay:.2s} .thinking span:nth-child(3){animation-delay:.4s}
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }
.badge { display:inline-flex; align-items:center; gap:4px; background:var(--success-light); color:var(--success); font-size:11px; padding:3px 8px; border-radius:7px; margin-top:8px; font-weight:500; }
footer { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:10px 14px 16px; }
.input-row { display:flex; gap:7px; align-items:flex-end; }
textarea { flex:1; border:1.5px solid var(--border); border-radius:13px; padding:10px 13px; font-size:13px; font-family:inherit; resize:none; min-height:44px; max-height:110px; outline:none; transition:border-color .2s; color:var(--text); background:var(--bg); line-height:1.5; }
textarea:focus { border-color:var(--primary); }
textarea::placeholder { color:var(--light); }
.send { width:44px; height:44px; border-radius:13px; background:linear-gradient(135deg,var(--primary),var(--accent)); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .15s; flex-shrink:0; }
.send:hover { transform:scale(1.05); }
.send:active { transform:scale(.96); }
.send:disabled { opacity:.5; cursor:not-allowed; transform:none; }
</style>
</head>
<body>
<header>
  <div class="logo">🎓</div>
  <div class="header-info">
    <h1>مساعد الطلاب الذكي</h1>
    <p>مساعدك الذكي لشرح الدروس</p>
  </div>
  <div class="dot"></div>
</header>
<div class="subjects">
  <button class="chip active" onclick="setSubject(this,'')">الكل</button>
  <button class="chip" onclick="setSubject(this,'الرياضيات')">🔢 رياضيات</button>
  <button class="chip" onclick="setSubject(this,'الفيزياء')">⚡ فيزياء</button>
  <button class="chip" onclick="setSubject(this,'الكيمياء')">🧪 كيمياء</button>
  <button class="chip" onclick="setSubject(this,'الأحياء')">🌱 أحياء</button>
  <button class="chip" onclick="setSubject(this,'التاريخ')">📜 تاريخ</button>
  <button class="chip" onclick="setSubject(this,'الإنجليزي')">🇬🇧 إنجليزي</button>
</div>
<div id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">📚</div>
    <h2>مرحباً بك!</h2>
    <p>اسألني عن أي درس أو مسألة وسأشرح لك بطريقة سهلة وواضحة</p>
    <div class="quick-grid">
      <button class="quick-btn" onclick="quickAsk(this)">ما هي قوانين نيوتن في الحركة؟</button>
      <button class="quick-btn" onclick="quickAsk(this)">اشرح لي نظرية فيثاغورس</button>
      <button class="quick-btn" onclick="quickAsk(this)">ما الفرق بين الحمض والقاعدة؟</button>
      <button class="quick-btn" onclick="quickAsk(this)">كيف تعمل عملية التمثيل الضوئي؟</button>
    </div>
  </div>
</div>
<footer>
  <div class="input-row">
    <textarea id="inp" placeholder="اكتب سؤالك هنا..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="send" id="sendBtn" onclick="send()">➤</button>
  </div>
</footer>
<script>
let subject = '';
let loading = false;

function setSubject(el, s) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  subject = s;
}
function quickAsk(btn) {
  document.getElementById('inp').value = btn.textContent;
  send();
}
function addMsg(role, html) {
  const w = document.getElementById('welcome');
  if (w) w.remove();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'user') {
    div.innerHTML = '<div class="av">أنا</div><div class="bubble">' + html + '</div>';
  } else {
    div.innerHTML = '<div class="av">🤖</div><div class="bubble">' + html + '</div>';
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function showLoading() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'loader';
  div.innerHTML = '<div class="av">🤖</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function removeLoader() {
  const el = document.getElementById('loader');
  if (el) el.remove();
}
async function send() {
  if (loading) return;
  const inp = document.getElementById('inp');
  const q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  inp.style.height = 'auto';
  loading = true;
  document.getElementById('sendBtn').disabled = true;
  const sub = subject ? 'المادة: ' + subject + '. ' : '';
  addMsg('user', q);
  showLoading();
  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: sub + q })
    });
    const data = await res.json();
    removeLoader();
    if (data.error) {
      addMsg('bot', 'خطأ: ' + data.error);
    } else {
      let text = data.answer.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
      addMsg('bot', text + '<br><br><span class="badge">🤖 مساعد الطلاب الذكي</span>');
    }
  } catch (e) {
    removeLoader();
    addMsg('bot', 'خطأ في الاتصال: ' + e.message);
  }
  loading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inp').focus();
}
</script>
</body>
</html>
