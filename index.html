<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مساعد الطلاب الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary:#2563EB; --primary-light:#EFF6FF; --primary-dark:#1E40AF;
  --accent:#7C3AED; --bg:#F8FAFF; --surface:#FFFFFF;
  --text:#0F172A; --muted:#64748B; --light:#94A3B8;
  --border:#E2E8F0; --success:#059669; --success-light:#ECFDF5;
  --danger:#DC2626;
}
body { font-family:'IBM Plex Sans Arabic',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; overflow:hidden; }

#loginScreen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; padding:20px; }
.login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:32px 24px; width:100%; max-width:360px; text-align:center; }
.login-logo { font-size:52px; margin-bottom:16px; }
.login-card h1 { font-size:20px; font-weight:700; margin-bottom:8px; }
.login-card p { font-size:13px; color:var(--muted); margin-bottom:20px; line-height:1.6; }
.price-badge { background:var(--primary-light); color:var(--primary-dark); font-size:13px; font-weight:700; padding:6px 16px; border-radius:20px; display:inline-block; margin-bottom:20px; }
.login-input { width:100%; border:1.5px solid var(--border); border-radius:12px; padding:12px 16px; font-size:15px; font-family:inherit; outline:none; text-align:center; letter-spacing:3px; color:var(--text); background:var(--bg); margin-bottom:12px; transition:border-color .2s; }
.login-input:focus { border-color:var(--primary); }
.login-btn { width:100%; background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; }
.error-msg { color:var(--danger); font-size:12px; margin-top:8px; display:none; }
.contact-info { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); line-height:1.8; }
.contact-info a { color:var(--primary); text-decoration:none; font-weight:500; }

header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; box-shadow:0 1px 8px rgba(0,0,0,0.06); }
.logo { width:38px; height:38px; background:linear-gradient(135deg,var(--primary),var(--accent)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.header-info h1 { font-size:15px; font-weight:700; }
.header-info p { font-size:11px; color:var(--muted); }
.dot { width:8px; height:8px; background:var(--success); border-radius:50%; margin-right:auto; animation:pulse 2s infinite; }
.logout-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:4px 10px; font-size:11px; color:var(--muted); cursor:pointer; font-family:inherit; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.subjects { background:var(--surface); padding:8px 12px; border-bottom:1px solid var(--border); display:flex; gap:6px; overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
.subjects::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:5px 12px; border-radius:20px; font-size:11px; font-weight:500; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-family:inherit; transition:all .2s; white-space:nowrap; }
.chip.active,.chip:hover { background:var(--primary); color:#fff; border-color:var(--primary); }

#chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; padding-bottom:160px; }

.welcome { padding:8px 0 16px; }
.welcome-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.welcome-icon-sm { font-size:32px; }
.welcome-title h2 { font-size:17px; font-weight:700; }
.welcome-title p { font-size:12px; color:var(--muted); margin-top:2px; }
.subject-label { font-size:11px; font-weight:600; color:var(--muted); margin-bottom:8px; }
.quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.quick-btn { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 12px; font-size:11px; color:var(--text); cursor:pointer; text-align:right; font-family:inherit; line-height:1.5; transition:all .2s; display:flex; align-items:flex-start; gap:6px; }
.quick-btn:hover { border-color:var(--primary); background:var(--primary-light); color:var(--primary-dark); }
.quick-btn .q-icon { font-size:15px; flex-shrink:0; }
.quick-btn .q-text { font-size:11px; line-height:1.4; }

.msg { display:flex; gap:8px; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction:row-reverse; }
.av { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-top:2px; }
.msg.user .av { background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; font-weight:700; font-size:11px; }
.msg.bot .av { background:linear-gradient(135deg,#F59E0B,#EF4444); font-size:16px; }
.bubble { max-width:84%; padding:11px 14px; border-radius:14px; font-size:13.5px; line-height:1.8; }
.msg.user .bubble { background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; border-radius:14px 4px 14px 14px; }
.msg.bot .bubble { background:var(--surface); border:1px solid var(--border); border-radius:4px 14px 14px 14px; color:var(--text); }

.thinking { display:flex; gap:5px; align-items:center; padding:6px 0; }
.thinking span { width:7px; height:7px; border-radius:50%; background:var(--light); animation:bounce 1.2s infinite; }
.thinking span:nth-child(2){animation-delay:.2s} .thinking span:nth-child(3){animation-delay:.4s}
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }
.badge { display:inline-flex; align-items:center; gap:4px; background:var(--success-light); color:var(--success); font-size:11px; padding:3px 8px; border-radius:7px; margin-top:8px; font-weight:500; }

footer { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:8px 14px 14px; }

/* Mode toggle */
.mode-row { display:flex; gap:8px; margin-bottom:8px; }
.mode-btn { flex:1; padding:8px; border-radius:10px; font-size:12px; font-weight:600; font-family:inherit; cursor:pointer; border:1.5px solid var(--border); background:transparent; color:var(--muted); transition:all .2s; display:flex; align-items:center; justify-content:center; gap:5px; }
.mode-btn.active { border-color:var(--primary); background:var(--primary-light); color:var(--primary-dark); }
.mode-btn.active.detailed { border-color:var(--accent); background:#F5F3FF; color:var(--accent); }

.input-row { display:flex; gap:7px; align-items:flex-end; }
textarea { flex:1; border:1.5px solid var(--border); border-radius:13px; padding:10px 13px; font-size:13px; font-family:inherit; resize:none; min-height:44px; max-height:110px; outline:none; transition:border-color .2s; color:var(--text); background:var(--bg); line-height:1.5; }
textarea:focus { border-color:var(--primary); }
textarea::placeholder { color:var(--light); }
.send { width:44px; height:44px; border-radius:13px; background:linear-gradient(135deg,var(--primary),var(--accent)); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .15s; flex-shrink:0; }
.send:hover { transform:scale(1.05); }
.send:active { transform:scale(.96); }
.send:disabled { opacity:.5; cursor:not-allowed; transform:none; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🎓</div>
    <h1>مساعد الطلاب الذكي</h1>
    <p>مساعدك الشخصي لشرح الدروس وحل الأسئلة بالذكاء الاصطناعي</p>
    <div class="price-badge">✨ الاشتراك الشهري — 10 ريال فقط</div>
    <input type="text" id="codeInput" class="login-input" placeholder="أدخل كود الدخول" maxlength="8">
    <button class="login-btn" onclick="checkCode()">دخول ←</button>
    <p class="error-msg" id="errorMsg">❌ كود غير صحيح، تأكد وحاول مرة أخرى</p>
    <div class="contact-info">
      للاشتراك وشراء كود الدخول<br>
      تواصل معنا عبر واتساب<br>
      <a href="https://wa.me/966500000000">اضغط هنا للتواصل</a>
    </div>
  </div>
</div>

<header>
  <div class="logo">🎓</div>
  <div class="header-info">
    <h1>مساعد الطلاب الذكي</h1>
    <p>مساعدك الذكي لشرح الدروس</p>
  </div>
  <div class="dot"></div>
  <button class="logout-btn" onclick="logout()">خروج</button>
</header>

<div class="subjects">
  <button class="chip active" onclick="setSubject(this,'الكل','🌟')">الكل</button>
  <button class="chip" onclick="setSubject(this,'الرياضيات','🔢')">🔢 رياضيات</button>
  <button class="chip" onclick="setSubject(this,'الفيزياء','⚡')">⚡ فيزياء</button>
  <button class="chip" onclick="setSubject(this,'الكيمياء','🧪')">🧪 كيمياء</button>
  <button class="chip" onclick="setSubject(this,'الأحياء','🌱')">🌱 أحياء</button>
  <button class="chip" onclick="setSubject(this,'التاريخ','📜')">📜 تاريخ</button>
  <button class="chip" onclick="setSubject(this,'الإنجليزي','🇬🇧')">🇬🇧 إنجليزي</button>
</div>

<div id="chat"></div>

<footer>
  <div class="mode-row">
    <button class="mode-btn active" id="quickBtn" onclick="setMode('quick')">⚡ جواب سريع</button>
    <button class="mode-btn" id="detailBtn" onclick="setMode('detailed')">📖 شرح مفصل</button>
  </div>
  <div class="input-row">
    <textarea id="inp" placeholder="اكتب سؤالك هنا..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="send" id="sendBtn" onclick="send()">➤</button>
  </div>
</footer>

<script>
const VALID_CODES = ['TALEB01','TALEB02','TALEB03','TALEB04','TALEB05','TALEB06','TALEB07','TALEB08','TALEB09','TALEB10','TALEB11','TALEB12','TALEB13','TALEB14','TALEB15','TALEB16','TALEB17','TALEB18','TALEB19','TALEB20'];

const QUESTIONS = {
  'الكل': [
    {icon:'🔢', text:'ما هي قاعدة فيثاغورس؟'},
    {icon:'⚡', text:'اشرح قوانين نيوتن'},
    {icon:'🧪', text:'ما الفرق بين الحمض والقاعدة؟'},
    {icon:'🌱', text:'كيف تعمل عملية التمثيل الضوئي؟'},
  ],
  'الرياضيات': [
    {icon:'📐', text:'اشرح نظرية فيثاغورس مع مثال'},
    {icon:'➗', text:'كيف أحل المعادلات التربيعية؟'},
    {icon:'📊', text:'ما هي المشتقات وكيف أحسبها؟'},
    {icon:'🔺', text:'اشرح قوانين المثلثات'},
  ],
  'الفيزياء': [
    {icon:'🍎', text:'اشرح قوانين نيوتن للحركة'},
    {icon:'⚡', text:'ما هو قانون أوم في الكهرباء؟'},
    {icon:'🌊', text:'اشرح الموجات الصوتية والضوئية'},
    {icon:'🔭', text:'ما هي قوانين الحركة الدائرية؟'},
  ],
  'الكيمياء': [
    {icon:'⚗️', text:'ما الفرق بين الحمض والقاعدة؟'},
    {icon:'🔗', text:'اشرح الروابط الكيميائية'},
    {icon:'⚖️', text:'كيف أوازن المعادلات الكيميائية؟'},
    {icon:'🧬', text:'ما هي الكيمياء العضوية؟'},
  ],
  'الأحياء': [
    {icon:'🌿', text:'اشرح عملية التمثيل الضوئي'},
    {icon:'🧬', text:'ما هو الحمض النووي DNA؟'},
    {icon:'🫀', text:'كيف يعمل الجهاز الدوري؟'},
    {icon:'🦠', text:'ما الفرق بين الخلية النباتية والحيوانية؟'},
  ],
  'التاريخ': [
    {icon:'🏛️', text:'ما هي أسباب سقوط الإمبراطورية الرومانية؟'},
    {icon:'⚔️', text:'اشرح أسباب الحرب العالمية الأولى'},
    {icon:'🕌', text:'ما هي الحضارة الإسلامية في العصر الذهبي؟'},
    {icon:'🗺️', text:'ما هي الثورة الصناعية وأثرها؟'},
  ],
  'الإنجليزي': [
    {icon:'📝', text:'اشرح الفرق بين Present Simple و Present Continuous'},
    {icon:'🔤', text:'متى أستخدم Since و For؟'},
    {icon:'✍️', text:'كيف أكتب مقالة باللغة الإنجليزية؟'},
    {icon:'💬', text:'اشرح الـ Passive Voice مع أمثلة'},
  ],
};

let subject = 'الكل';
let mode = 'quick';
let loading = false;

function checkCode() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (VALID_CODES.includes(code)) {
    localStorage.setItem('studentCode', code);
    document.getElementById('loginScreen').style.display = 'none';
    showWelcome('الكل', '🌟');
  } else {
    document.getElementById('errorMsg').style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('studentCode');
  location.reload();
}

if (localStorage.getItem('studentCode') && VALID_CODES.includes(localStorage.getItem('studentCode'))) {
  document.getElementById('loginScreen').style.display = 'none';
  showWelcome('الكل', '🌟');
}

document.getElementById('codeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkCode();
});

function setMode(m) {
  mode = m;
  document.getElementById('quickBtn').classList.toggle('active', m === 'quick');
  document.getElementById('detailBtn').classList.toggle('active', m === 'detailed');
  document.getElementById('detailBtn').classList.toggle('detailed', m === 'detailed');
  document.getElementById('inp').placeholder = m === 'quick' ? 'اكتب سؤالك للجواب السريع...' : 'اكتب سؤالك للشرح المفصل...';
}

function setSubject(el, s, icon) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  subject = s;
  showWelcome(s, icon);
}

function showWelcome(s, icon) {
  const chat = document.getElementById('chat');
  const old = document.getElementById('welcome');
  if (old) old.remove();
  const questions = QUESTIONS[s] || QUESTIONS['الكل'];
  const div = document.createElement('div');
  div.className = 'welcome';
  div.id = 'welcome';
  div.innerHTML = `
    <div class="welcome-header">
      <div class="welcome-icon-sm">${icon}</div>
      <div class="welcome-title">
        <h2>${s === 'الكل' ? 'أهلاً بك في مساعد الطلاب!' : 'مادة ' + s}</h2>
        <p>${s === 'الكل' ? 'اختر مادة أو اكتب سؤالك مباشرة' : 'اختر سؤالاً أو اكتب سؤالك الخاص'}</p>
      </div>
    </div>
    <div class="subject-label">${s === 'الكل' ? 'أسئلة مقترحة' : 'أسئلة ' + s}</div>
    <div class="quick-grid">
      ${questions.map(q => `<button class="quick-btn" onclick="quickAsk('${q.text}')"><span class="q-icon">${q.icon}</span><span class="q-text">${q.text}</span></button>`).join('')}
    </div>
  `;
  chat.insertBefore(div, chat.firstChild);
}

function quickAsk(text) {
  document.getElementById('inp').value = text;
  send();
}

function addMsg(role, html) {
  const w = document.getElementById('welcome');
  if (w) w.remove();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'user') {
    div.innerHTML = '<div class="av">أنا</div><div class="bubble">' + html + '</div>';
  } else {
    div.innerHTML = '<div class="av">🤖</div><div class="bubble">' + html + '</div>';
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showLoading() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'loader';
  div.innerHTML = '<div class="av">🤖</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeLoader() {
  const el = document.getElementById('loader');
  if (el) el.remove();
}

async function send() {
  if (loading) return;
  const inp = document.getElementById('inp');
  const q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  inp.style.height = 'auto';
  loading = true;
  document.getElementById('sendBtn').disabled = true;

  const sub = subject && subject !== 'الكل' ? 'المادة: ' + subject + '. ' : '';
  const modeInstruction = mode === 'quick'
    ? 'أجب بشكل مختصر جداً في 2-3 جمل فقط. الجواب السريع فقط بدون شرح طويل.'
    : 'اشرح بشكل مفصل وكامل مع أمثلة وخطوات واضحة. استخدم العناوين والنقاط لتنظيم الشرح.';

  const modeLabel = mode === 'quick' ? '⚡ جواب سريع' : '📖 شرح مفصل';
  addMsg('user', (mode === 'quick' ? '⚡ ' : '📖 ') + q);
  showLoading();

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: sub + q, instruction: modeInstruction })
    });
    const data = await res.json();
    removeLoader();
    if (data.error) {
      addMsg('bot', 'خطأ: ' + data.error);
    } else {
      let text = data.answer.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/###\s*(.*?)<br>/g, '<b>$1</b><br>').replace(/##\s*(.*?)<br>/g, '<b>$1</b><br>');
      addMsg('bot', text + '<br><br><span class="badge">' + modeLabel + '</span>');
    }
  } catch (e) {
    removeLoader();
    addMsg('bot', 'خطأ في الاتصال: ' + e.message);
  }
  loading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inp').focus();
}
</script>
</body>
</html>
